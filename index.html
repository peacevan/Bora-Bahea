<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bora Bahea 2026 — Brasileirão Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--azul:#0A2D6E;--azul-mid:#1449B0;--vermelho:#C8102E;--branco:#FFFFFF;--cinza-bg:#EEF1F8;--cinza-card:#FFFFFF;--cinza-border:rgba(10,45,110,0.11);--cinza-text:#4A5568;--cinza-muted:#8A96A8;--verde:#16A34A;--amarelo:#D97706;--sombra:0 2px 12px rgba(10,45,110,0.09);--sombra-forte:0 4px 24px rgba(10,45,110,0.16);--radius:16px;--radius-sm:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--cinza-bg);color:var(--azul);min-height:100vh;max-width:480px;margin:0 auto}
.app-header{background:linear-gradient(160deg,#081F50 0%,#0A2D6E 55%,#1449B0 100%);padding:48px 18px 18px;position:relative;overflow:hidden}
.app-header::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(200,16,46,.28) 0%,transparent 70%)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:relative;z-index:1}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-circle{width:50px;height:50px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 3px rgba(200,16,46,.55),0 4px 12px rgba(0,0,0,.2);flex-shrink:0}
.logo-name h1{font-family:'Barlow Condensed',sans-serif;font-size:23px;font-weight:900;color:#fff;letter-spacing:.02em;line-height:1}
.logo-name p{font-size:10px;color:rgba(255,255,255,.5);font-weight:600;letter-spacing:.1em;margin-top:2px;text-transform:uppercase}
.header-actions{display:flex;gap:6px}
.icon-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:50%;cursor:pointer;color:rgba(255,255,255,.8);text-decoration:none;font-size:12px;font-weight:700;transition:background .2s}
.icon-btn:hover{background:rgba(255,255,255,.2)}
.icon-btn.spinning{animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;position:relative;z-index:1}
.stat-item{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.13);border-radius:10px;padding:8px 5px;text-align:center}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:#fff;line-height:1}
.stat-val.red{color:#FF7070}.stat-val.green{color:#5EE8A0}.stat-val.amber{color:#FBBF24}
.stat-lbl{font-size:8.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.42);margin-top:2px}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:.06em;margin-top:10px;position:relative;z-index:1}
.live-dot{width:6px;height:6px;border-radius:50%;background:#5EE8A0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
.bottom-nav{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--cinza-border);display:flex;z-index:100;box-shadow:0 -4px 20px rgba(10,45,110,.10)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 12px;border:none;background:transparent;cursor:pointer;gap:4px;position:relative}
.nav-btn.on::before{content:'';position:absolute;top:0;left:20%;right:20%;height:3px;background:var(--vermelho);border-radius:0 0 4px 4px}
.nav-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.nav-label{font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--cinza-muted)}
.nav-btn.on .nav-label{color:var(--azul)}
.content{padding:14px;padding-bottom:80px}
.tab-panel{display:none}.tab-panel.on{display:block;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--azul);margin:18px 0 9px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--cinza-border)}
.sec-title:first-child{margin-top:4px}
.card{background:var(--cinza-card);border-radius:var(--radius);box-shadow:var(--sombra);border:1px solid var(--cinza-border);overflow:hidden}
/* PROJ HERO */
.proj-hero{background:linear-gradient(135deg,#081F50 0%,#1449B0 100%);border-radius:var(--radius);padding:18px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;position:relative;overflow:hidden;box-shadow:var(--sombra-forte)}
.proj-hero::before{content:'';position:absolute;right:-20px;top:-20px;width:110px;height:110px;border-radius:50%;background:rgba(200,16,46,.22)}
.proj-hero::after{content:'';position:absolute;left:-10px;bottom:-30px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.04)}
.proj-left{position:relative;z-index:1}
.proj-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:2px}
.proj-num{font-family:'Barlow Condensed',sans-serif;font-size:58px;font-weight:900;color:#fff;line-height:1}
.proj-sub{font-size:11px;color:rgba(255,255,255,.48);margin-top:3px}
.proj-right{position:relative;z-index:1;text-align:right}
.proj-aprov-val{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;line-height:1}
.proj-aprov-lbl{font-size:10px;color:rgba(255,255,255,.42);margin-top:1px}
.proj-meta-badges{margin-top:10px;display:flex;flex-wrap:wrap;gap:4px}
.proj-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:999px;letter-spacing:.04em}
.pb-ating{background:rgba(94,232,160,.18);color:#5EE8A0;border:1px solid rgba(94,232,160,.3)}
.pb-risco{background:rgba(251,191,36,.18);color:#FBBF24;border:1px solid rgba(251,191,36,.3)}
.pb-fora{background:rgba(255,100,100,.18);color:#FF7070;border:1px solid rgba(255,100,100,.3)}
/* STAT CARD */
.stat-card{background:var(--cinza-card);border-radius:var(--radius);box-shadow:var(--sombra);border:1px solid var(--cinza-border);padding:16px}
.stat-card-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--cinza-muted);margin-bottom:14px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.stat-box{background:var(--cinza-bg);border-radius:var(--radius-sm);padding:10px 6px;text-align:center;border:1px solid var(--cinza-border)}
.stat-box-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;line-height:1;color:var(--azul)}
.stat-box-val.green{color:var(--verde)}.stat-box-val.amber{color:var(--amarelo)}.stat-box-val.red{color:var(--vermelho)}
.stat-box-lbl{font-size:8.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--cinza-muted);margin-top:2px}
.goals-row{display:flex;gap:8px;margin-bottom:12px}
.goal-chip{flex:1;background:var(--cinza-bg);border-radius:var(--radius-sm);padding:9px 10px;text-align:center;border:1px solid var(--cinza-border)}
.goal-chip-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;line-height:1}
.goal-chip-val.green{color:var(--verde)}.goal-chip-val.red{color:var(--vermelho)}.goal-chip-val.amber{color:var(--amarelo)}
.goal-chip-lbl{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--cinza-muted);margin-top:1px}
.aprov-bar-wrap{height:8px;background:var(--cinza-bg);border-radius:999px;overflow:hidden;border:1px solid var(--cinza-border)}
.aprov-bar{height:100%;border-radius:999px;transition:width .6s ease}
.aprov-label{display:flex;justify-content:space-between;font-size:10px;color:var(--cinza-muted);margin-top:4px;font-weight:600}
.last5-row{display:flex;gap:4px;margin-top:10px;align-items:center}
.last5-lbl{font-size:10px;font-weight:700;color:var(--cinza-muted);letter-spacing:.06em;text-transform:uppercase;margin-right:4px}
.l5-chip{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;font-family:'Barlow Condensed',sans-serif}
.l5-v{background:#DCFCE7;color:#166534}.l5-e{background:#EFF6FF;color:#1E40AF}.l5-d{background:#FEE2E2;color:#991B1B}
/* METAS */
.meta-list{padding:4px 0}
.meta-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--cinza-border)}
.meta-row:last-child{border-bottom:none}
.meta-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.meta-info{flex:1;min-width:0}
.meta-name{font-size:13px;font-weight:700;color:var(--azul)}
.meta-sub{font-size:11px;color:var(--cinza-text);margin-top:1px}
.meta-bar-wrap{width:70px;height:4px;background:var(--cinza-bg);border-radius:999px;overflow:hidden;margin-top:5px}
.meta-bar{height:100%;border-radius:999px;transition:width .5s}
.meta-pts{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;text-align:right;min-width:44px}
.meta-tag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:999px;letter-spacing:.04em}
.tag-ok{background:#DCFCE7;color:#166534}.tag-pend{background:#EFF6FF;color:#1E40AF}
/* TABELA */
.tabela-wrap{overflow-x:auto}
.tabela{width:100%;border-collapse:collapse;font-size:11.5px}
.tabela thead th{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--cinza-muted);padding:10px 4px;border-bottom:2px solid var(--cinza-border);text-align:center;background:var(--cinza-bg);white-space:nowrap}
.tabela thead th.th-time{text-align:left;padding-left:8px}
.tabela tbody tr{border-bottom:1px solid var(--cinza-border);transition:background .15s}
.tabela tbody tr:hover{background:var(--cinza-bg)}
.tabela tbody tr:last-child{border-bottom:none}
.tabela td{padding:7px 4px;text-align:center;color:var(--azul);font-weight:500}
.tabela tbody tr.bahia-row{background:rgba(20,73,176,.07)}
.tabela tbody tr.bahia-row td{font-weight:700}
.zona-sep td{border-top:2px dashed rgba(10,45,110,.12)}
.pos-cell{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;padding-left:8px!important;text-align:left!important;white-space:nowrap}
.zona-pip{display:inline-block;width:4px;height:15px;border-radius:2px;vertical-align:middle;margin-right:4px}
.team-cell{text-align:left!important;padding-left:6px!important}
.team-inner{display:flex;align-items:center;gap:6px}
.team-avatar{width:22px;height:22px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--cinza-bg)}
.team-nm{font-size:12px;font-weight:700;white-space:nowrap}
.team-nm.bahia{color:var(--azul-mid);font-weight:900}
.pts-cell{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900}
.l5-mini{display:flex;gap:2px;justify-content:center}
.l5m{width:13px;height:13px;border-radius:3px;font-size:8px;font-weight:900;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif}
.l5m.v{background:#DCFCE7;color:#166534}.l5m.e{background:#EFF6FF;color:#1E40AF}.l5m.d{background:#FEE2E2;color:#991B1B}
.tabela-leg{display:flex;gap:12px;padding:8px 14px;font-size:10px;color:var(--cinza-muted);font-weight:600;flex-wrap:wrap}
.leg-zona{display:flex;align-items:center;gap:4px}
.leg-dot{width:8px;height:8px;border-radius:2px}
/* BLOCOS */
.bloco-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bloco-card{background:var(--cinza-card);border-radius:var(--radius-sm);border:1.5px solid var(--cinza-border);padding:12px;box-shadow:var(--sombra)}
.bloco-card.ok{border-color:#16A34A;background:#F0FDF4}.bloco-card.fail{border-color:#DC2626;background:#FEF2F2}.bloco-card.partial{border-color:#D97706;background:#FFFBEB}
.bloco-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.bloco-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;color:var(--azul);letter-spacing:.04em;text-transform:uppercase}
.bloco-badge{font-size:8.5px;font-weight:800;padding:2px 6px;border-radius:999px}
.bb-ok{background:#DCFCE7;color:#166534}.bb-fail{background:#FEE2E2;color:#991B1B}.bb-pend{background:#F1F5F9;color:#475569}.bb-partial{background:#FEF3C7;color:#92400E}
.bloco-pts-row{display:flex;align-items:baseline;gap:3px}
.bloco-real{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;line-height:1}
.bloco-real.green{color:#16A34A}.bloco-real.red{color:#DC2626}.bloco-real.amber{color:#D97706}.bloco-real.muted{color:var(--cinza-muted)}
.bloco-sep{font-size:13px;color:var(--cinza-muted)}.bloco-meta-v{font-size:15px;color:var(--cinza-text);font-weight:600}
.bloco-sub{font-size:10px;color:var(--cinza-muted);margin-top:2px}
.bloco-extras{margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,.07)}
.saldo-chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.saldo-chip{font-size:9px;font-weight:800;padding:2px 7px;border-radius:999px}
.sp{background:#DCFCE7;color:#166534}.sn{background:#FEE2E2;color:#991B1B}.sz{background:#F1F5F9;color:#475569}
.bloco-acum{font-size:10px;color:var(--cinza-text);font-weight:700;margin-bottom:6px}
.sim-wrap{background:rgba(0,0,0,.03);border-radius:6px;padding:7px 8px}
.sim-title{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--cinza-muted);margin-bottom:5px}
.sim-line{display:flex;align-items:center;gap:4px;font-size:9.5px;margin-bottom:3px}
.sim-line:last-child{margin-bottom:0}
.sim-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sim-txt{color:var(--cinza-text);font-weight:600;flex:1}
.sim-val{font-weight:900;font-size:10px}
/* OSC */
.osc-grid{display:flex;flex-direction:column;gap:6px}
.osc-row{background:var(--cinza-card);border-radius:var(--radius-sm);border:1px solid var(--cinza-border);padding:10px 14px;display:flex;align-items:center;gap:10px}
.osc-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--azul);min-width:62px}
.osc-bar-track{flex:1;height:14px;background:var(--cinza-bg);border-radius:4px;overflow:hidden;display:flex}
.osc-pos-bar{height:100%;background:linear-gradient(90deg,#16A34A,#4ADE80);transition:width .5s;border-radius:4px 0 0 4px}
.osc-neg-bar{height:100%;background:linear-gradient(90deg,#FCA5A5,#DC2626);transition:width .5s;border-radius:0 4px 4px 0}
.osc-val{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;min-width:38px;text-align:right}
.osc-val.pos{color:#16A34A}.osc-val.neg{color:#DC2626}.osc-val.zero{color:var(--cinza-muted)}
/* JOGOS */
.turn-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:var(--azul-mid);padding:6px 14px;border-radius:var(--radius-sm);margin:14px 0 6px;display:inline-block}
.game-card{background:var(--cinza-card);border-radius:var(--radius-sm);border:1px solid var(--cinza-border);display:grid;grid-template-columns:28px 1fr auto auto;align-items:stretch;margin-bottom:4px;overflow:hidden;box-shadow:0 1px 4px rgba(10,45,110,.05)}
.game-card.played-w{border-left:3px solid #16A34A}.game-card.played-e{border-left:3px solid #2563EB}.game-card.played-l{border-left:3px solid #DC2626}.game-card.next-game{border-left:3px solid var(--vermelho);background:#FFF8F8}
.game-rnd{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--cinza-muted);background:var(--cinza-bg);border-right:1px solid var(--cinza-border);min-width:28px}
.game-info{padding:8px 10px;display:flex;flex-direction:column;justify-content:center;min-width:0}
.game-opp{font-size:13px;font-weight:700;color:var(--azul);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-meta{font-size:10px;color:var(--cinza-muted);margin-top:1px;display:flex;align-items:center;gap:4px}
.loc-badge{font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;flex-shrink:0}
.loc-c{background:var(--azul);color:white}.loc-f{background:var(--cinza-bg);color:var(--cinza-text);border:1px solid var(--cinza-border)}
.score-tag{font-size:10px;font-weight:800;color:#1449B0;background:rgba(20,73,176,.08);padding:1px 5px;border-radius:4px}
.game-pts-col{display:flex;align-items:center;justify-content:center;min-width:30px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;border-left:1px solid var(--cinza-border)}
.gpts-w{color:#16A34A}.gpts-e{color:#2563EB}.gpts-l{color:#DC2626}.gpts-p{color:var(--cinza-bg)}
.game-sel-col{display:flex;align-items:center;padding:0 6px;border-left:1px solid var(--cinza-border)}
.res-sel{font-size:11px;font-weight:700;border:1px solid var(--cinza-border);border-radius:6px;padding:4px 4px;background:var(--cinza-bg);color:var(--azul);cursor:pointer;width:70px;appearance:none;text-align:center}
/* GRAFICO */
.chart-card{background:var(--cinza-card);border-radius:var(--radius);border:1px solid var(--cinza-border);padding:14px;box-shadow:var(--sombra)}
.chart-legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-bottom:12px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--cinza-text)}
.leg-line{width:18px;height:3px;border-radius:2px}
.last-update{font-size:10px;color:var(--cinza-muted);font-weight:600;text-align:center;padding:10px 0 4px;letter-spacing:.04em}
</style>
</head>
